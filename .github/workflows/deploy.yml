name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t devops-app .

    - name: Verify files
      run: |
        echo "Build successful!"
        ls -la

    - name: Deploy notification
      run: echo "Deploying to Azure!"